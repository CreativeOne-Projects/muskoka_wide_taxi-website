<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <title>Muskoka Wide Taxi — Open Graph</title>
  <!-- Self-describing layout metadata for the Adobe Express exporter -->
  <meta name="hz:slide-selector" content=".og" />
  <meta name="hz:canvas-width" content="1200" />
  <meta name="hz:canvas-height" content="630" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #091F4D; }

    .og {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background:
        radial-gradient(1100px 700px at 18% -10%, #15397f 0%, rgba(21,57,127,0) 60%),
        linear-gradient(135deg, #0D2E6E 0%, #091F4D 100%);
      font-family: 'Inter', sans-serif;
    }

    /* subtle depth + texture */
    .og::before {
      content: "";
      position: absolute;
      left: -120px; top: 50%;
      width: 620px; height: 620px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: rgba(255,255,255,0.045);
      box-shadow: 0 0 0 60px rgba(255,255,255,0.025);
    }
    /* warm sheen top-right */
    .og::after {
      content: "";
      position: absolute;
      right: -160px; top: -160px;
      width: 520px; height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(204,33,40,0.28) 0%, rgba(204,33,40,0) 68%);
    }

    /* left accent bar */
    .accent-bar {
      position: absolute;
      left: 0; top: 0;
      width: 12px; height: 100%;
      background: linear-gradient(180deg, #CC2128 0%, #A8191F 100%);
    }

    .logo {
      position: absolute;
      left: 64px; top: 50%;
      transform: translateY(-50%);
      width: 330px; height: 330px;
      z-index: 2;
      filter: drop-shadow(0 16px 32px rgba(0,0,0,0.35));
    }

    .content {
      position: absolute;
      left: 420px; top: 0;
      width: 732px; height: 630px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 2;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      align-self: flex-start;
      padding: 12px 24px;
      border: 1px solid rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.10);
      border-radius: 999px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.96);
      margin-bottom: 26px;
    }
    .kicker .dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: #2ec27e;
      box-shadow: 0 0 0 4px rgba(46,194,126,0.25);
    }

    .headline {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 54px;
      line-height: 1.08;
      color: #ffffff;
      letter-spacing: -1px;
    }
    .headline .accent { color: #FF5C61; }

    .subhead {
      margin-top: 20px;
      font-size: 20px;
      font-weight: 500;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
      max-width: 590px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      align-self: flex-start;
      margin-top: 34px;
      padding: 17px 32px;
      background: linear-gradient(180deg, #CC2128 0%, #B41C22 100%);
      border-radius: 999px;
      box-shadow: 0 14px 30px rgba(204,33,40,0.40);
    }
    .cta svg { width: 26px; height: 26px; fill: #ffffff; }
    .cta .num {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.3px;
    }

    .footer {
      position: absolute;
      right: 48px; bottom: 34px;
      z-index: 2;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.62);
    }
  </style>
</head>
<body>
  <div class="og" data-canvas-width="1200" data-canvas-height="630">
    <div class="accent-bar"></div>

    <img class="logo" src="LOGO_DATA_URI" alt="Muskoka Wide Taxi logo" width="330" height="330" />

    <div class="content">
      <span class="kicker"><span class="dot"></span>On-Demand · Muskoka-Wide</span>
      <h1 class="headline">Your Neighbourhood Ride,<br /><span class="accent">Muskoka-Wide.</span></h1>
      <p class="subhead">Providing reliable transportation from Severn to Huntsville, accommodating up to 7 passengers.</p>
      <div class="cta">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.62 10.79a15.53 15.53 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.02-.24 11.36 11.36 0 0 0 3.57.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.36 11.36 0 0 0 .57 3.57 1 1 0 0 1-.25 1.02l-2.2 2.2z"/></svg>
        <span class="num">(705) 394-5944</span>
      </div>
    </div>

    <span class="footer">muskokawidetaxi.com</span>
  </div>
</body>
</html>
